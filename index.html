<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSF | Заполнитель рапортов</title>
    <link rel="stylesheet" href="css/report-style.css">
    <link rel="icon" type="image/png" href="assets/msf-logo.png">
</head>
<body>
    <div class="background-overlay"></div>

    <header class="header">
        <div class="header-content">
            <img src="assets/msf-logo.png" alt="MSF" class="logo">
            <div class="title">
                <h1>ЗАПОЛНИТЕЛЬ РАПОРТОВ MSF</h1>
                <span class="subtitle">СИСТЕМА ОФОРМЛЕНИЯ ДОКУМЕНТАЦИИ</span>
            </div>
            <div class="access-display">
                <span>УРОВЕНЬ ДОСТУПА: </span>
                <span id="access-level" class="access-level delta">Δ-DELTA</span>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="panel">
            <h2>ФОРМА ЗАПОЛНЕНИЯ РАПОРТА</h2>
            <p class="panel-description">Выберите тип документа для заполнения</p>

            <div class="report-type-selector">
                <label class="report-type-card">
                    <input type="radio" name="reportType" value="promotion">
                    <div class="report-type-content">
                        <span class="report-type-title">Рапорт о предоставлении к повышению</span>
                        <span class="report-type-access">Требуемый доступ: Gamma и выше</span>
                    </div>
                </label>
                <label class="report-type-card">
                    <input type="radio" name="reportType" value="discipline">
                    <div class="report-type-content">
                        <span class="report-type-title">Рапорт о предоставлении к дисциплинарному взысканию или понижению</span>
                        <span class="report-type-access">Требуемый доступ: Gamma и выше</span>
                    </div>
                </label>
                <label class="report-type-card">
                    <input type="radio" name="reportType" value="absence">
                    <div class="report-type-content">
                        <span class="report-type-title">Рапорт об отсутствии</span>
                        <span class="report-type-access">Требуемый доступ: Delta и выше</span>
                    </div>
                </label>
                <label class="report-type-card">
                    <input type="radio" name="reportType" value="leave">
                    <div class="report-type-content">
                        <span class="report-type-title">Рапорт об отпуске</span>
                        <span class="report-type-access">Требуемый доступ: Delta и выше</span>
                    </div>
                </label>
                <label class="report-type-card">
                    <input type="radio" name="reportType" value="operation">
                    <div class="report-type-content">
                        <span class="report-type-title">Рапорт о результате операции</span>
                        <span class="report-type-access">Требуемый доступ: Gamma и выше</span>
                    </div>
                </label>
            </div>

            <div id="report-form-container" class="report-form-container hidden">
                <div class="two-columns">
                    <div id="form-column" class="form-column">
                        <div class="loading-placeholder">Загрузка формы...</div>
                    </div>
                    <div class="preview-column">
                        <div class="preview-header">
                            <span>ПРЕДВАРИТЕЛЬНЫЙ ПРОСМОТР</span>
                            <div class="preview-buttons">
                                <button id="copy-preview-btn" class="copy-preview-btn">КОПИРОВАТЬ</button>
                                <button id="send-webhook-btn" class="send-webhook-btn">ОТПРАВИТЬ В DISCORD</button>
                            </div>
                        </div>
                        <div id="report-preview" class="report-preview">
                            <p class="preview-placeholder">Выберите тип рапорта и заполните форму</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="access-input">
                <span>> КОД ДОСТУПА: </span>
                <input type="text" id="access-code-input" placeholder="Введите код доступа" maxlength="60">
            </div>
        </div>
    </footer>

    <div id="notification" class="notification hidden"></div>

    <script src="js/modules/loader.js"></script>
    <script src="js/modules/prom.js"></script>
    <script src="js/modules/disc.js"></script>
    <script src="js/modules/abs.js"></script>
    <script src="js/modules/leave.js"></script>
    <script src="js/modules/operation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
